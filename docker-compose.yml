services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "25433:5432"
    environment:
      POSTGRES_USER: eidolon_agent_memory
      POSTGRES_PASSWORD: eidolon_agent_memory
      POSTGRES_DB: eidolon_agent_memory
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eidolon_agent_memory"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: server
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://eidolon_agent_memory:eidolon_agent_memory@postgres:5432/eidolon_agent_memory
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      target: server
    ports:
      - "3100:3100"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://eidolon_agent_memory:eidolon_agent_memory@postgres:5432/eidolon_agent_memory
      MCP_TRANSPORT: http
      MCP_PORT: "3100"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://eidolon_agent_memory:eidolon_agent_memory@postgres:5432/eidolon_agent_memory
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
